name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/jenkins-app:${{ github.sha }}

    steps:
    # -------------------
    # 1. Checkout
    # -------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -------------------
    # 2. Setup Node
    # -------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # -------------------
    # 3. Install Dependencies (حل المشكلة)
    # -------------------
    - name: Install dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    # -------------------
    # 4. Run Tests
    # -------------------
    - name: Run Unit Tests
      run: npm test

    # -------------------
    # 🔐 5. Trivy FS Scan
    # -------------------
    - name: Run Trivy FS Scan
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        scan-type: fs
        scan-ref: .
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    # -------------------
    # 6. Build App
    # -------------------
    - name: Build App
      run: npm run build

    # -------------------
    # 7. Docker Login
    # -------------------
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # -------------------
    # 8. Build Image
    # -------------------
    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME .

    # -------------------
    # 🔐 9. Trivy Image Scan
    # -------------------
    - name: Run Trivy Image Scan
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        image-ref: ${{ env.IMAGE_NAME }}
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    # -------------------
    # 10. Push Image
    # -------------------
    - name: Push Docker Image
      run: docker push $IMAGE_NAME

    # -------------------
    # 11. Remove local image
    # -------------------
    - name: Remove local image
      run: docker rmi $IMAGE_NAME

    # -------------------
    # 12. Update deployment.yaml
    # -------------------
    - name: Update Kubernetes deployment file
      run: |
        sed -i 's|image: .*|image: '"$IMAGE_NAME"'|' deployment.yaml

    # -------------------
    # 13. Install kubectl
    # -------------------
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    # -------------------
    # 14. Set kubeconfig
    # -------------------
    - name: Set Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

    # -------------------
    # 15. Deploy to Kubernetes
    # -------------------
    - name: Deploy to K8s
      run: kubectl apply -f deployment.yaml

    # -------------------
    # Post Actions
    # -------------------
    - name: Always
      if: always()
      run: echo "Pipeline finished!"

    - name: Success
      if: success()
      run: echo "Deployment successful 🚀"

    - name: Failure
      if: failure()
      run: echo "Pipeline failed ❌"
