name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/jenkins-app:${{ github.sha }}

    steps:
    # -------------------
    # 1. Checkout
    # -------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -------------------
    # 2. Setup Java
    # -------------------
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven

    # -------------------
    # 3. Build & Test
    # -------------------
    - name: Build with Maven
      run: mvn clean install

    # -------------------
    # 4. Trivy FS Scan
    # -------------------
    - name: Run Trivy FS Scan
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        scan-type: fs
        scan-ref: .
        severity: CRITICAL,HIGH
        exit-code: 1

    # -------------------
    # 5. Docker Login
    # -------------------
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # -------------------
    # 6. Build Docker Image
    # -------------------
    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME .

    # -------------------
    # 7. Trivy Image Scan
    # -------------------
    - name: Run Trivy Image Scan
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        image-ref: ${{ env.IMAGE_NAME }}
        severity: CRITICAL,HIGH
        exit-code: 1

    # -------------------
    # 8. Push Image
    # -------------------
    - name: Push Docker Image
      run: docker push $IMAGE_NAME

    # -------------------
    # 9. Remove local image
    # -------------------
    - name: Remove local image
      run: docker rmi $IMAGE_NAME

    # -------------------
    # 10. Update deployment.yaml
    # -------------------
    - name: Update Kubernetes deployment file
      run: |
        sed -i 's|image: .*|image: '"$IMAGE_NAME"'|' deployment.yaml

    # -------------------
    # 11. Install kubectl
    # -------------------
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    # -------------------
    # 12. Set kubeconfig
    # -------------------
    - name: Set Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

    # -------------------
    # 13. Deploy
    # -------------------
    - name: Deploy to K8s
      run: kubectl apply -f deployment.yaml

    # -------------------
    # Post Actions
    # -------------------
    - name: Always
      if: always()
      run: echo "Pipeline finished!"

    - name: Success
      if: success()
      run: echo "Deployment successful "

    - name: Failure
      if: failure()
      run: echo "Pipeline failed "
