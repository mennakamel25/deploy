name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/jenkins-app:${{ github.sha }}

    steps:
    # -------------------
    # Checkout
    # -------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -------------------
    # Setup Node (مهم)
    # -------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    # -------------------
    # Install & Test
    # -------------------
    - name: Install dependencies
      run: npm ci

    - name: Run Unit Tests
      run: npm test

    # -------------------
    # 🔐 Trivy FS Scan
    # -------------------
    - name: Run Trivy FS Scan
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        scan-type: fs
        scan-ref: .
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    # -------------------
    # Build App
    # -------------------
    - name: Build App
      run: npm run build

    # -------------------
    # Docker Login
    # -------------------
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # -------------------
    # Build Image
    # -------------------
    - name: Build Docker Image
      run: docker build -t $IMAGE_NAME .

    # -------------------
    # 🔐 Trivy Image Scan
    # -------------------
    - name: Run Trivy Image Scan
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        image-ref: ${{ env.IMAGE_NAME }}
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    # -------------------
    # Push Image
    # -------------------
    - name: Push Docker Image
      run: docker push $IMAGE_NAME

    # -------------------
    # Remove local image
    # -------------------
    - name: Remove local image
      run: docker rmi $IMAGE_NAME

    # -------------------
    # Update deployment.yaml
    # -------------------
    - name: Update Kubernetes deployment file
      run: |
        sed -i 's|image: .*|image: '"$IMAGE_NAME"'|' deployment.yaml

    # -------------------
    # Setup kubectl
    # -------------------
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    # -------------------
    # Set kubeconfig (FIX مهم)
    # -------------------
    - name: Set Kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

    # -------------------
    # Deploy
    # -------------------
    - name: Deploy to K8s
      run: kubectl apply -f deployment.yaml

    # -------------------
    # Post Actions
    # -------------------
    - name: Always
      if: always()
      run: echo "Pipeline finished!"

    - name: Success
      if: success()
      run: echo "Deployment successful 🚀"

    - name: Failure
      if: failure()
      run: echo "Pipeline failed ❌"
