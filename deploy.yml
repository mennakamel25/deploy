apiVersion: apps/v1
kind: Deployment

metadata:
  name: jenkins-app
  labels:
    app: jenkins-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: jenkins-app

  template:
    metadata:
      labels:
        app: jenkins-app

    spec:
      containers:
      - name: jenkins-app
        image: YOUR_DOCKER_USERNAME/jenkins-app:latest   # هتتغير تلقائي في pipeline
        ports:
        - containerPort: 3000

        env:
        - name: NODE_ENV
          value: "production"

        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
